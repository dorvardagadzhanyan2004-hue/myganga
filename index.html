<style>
:root{
  --bg:#0a0b10; --bg2:#12141d; --panel:rgba(22,24,34,.85);
  --neon:#00e5ff; --neon2:#ff2d6e; --gold:#ffc83d; --green:#3ddc84;
  --txt:#e8eaf0; --dim:#7d8499; --line:rgba(255,255,255,.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  font-family:-apple-system,'Segoe UI',Roboto,sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--txt);overflow:hidden;
  user-select:none;-webkit-user-select:none;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
canvas{display:block;}
.hidden{display:none!important;}

/* TOP BAR */
#topbar{display:flex;gap:8px;padding:10px 12px;background:linear-gradient(180deg,#15171f,#0d0e14);
  border-bottom:1px solid var(--line);align-items:center;flex-wrap:wrap;z-index:5;}
.stat{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.35);
  padding:5px 9px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid var(--line);}
.stat b{color:var(--gold);}
.stat.cash b{color:var(--green);}
.stat.heat b{color:var(--neon2);}

/* SCREENS */
#screens{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;padding:14px;display:none;
  -webkit-overflow-scrolling:touch;}
.screen.active{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

h2{font-size:20px;margin-bottom:4px;letter-spacing:.5px;}
.sub{color:var(--dim);font-size:12px;margin-bottom:14px;}

.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:12px;backdrop-filter:blur(10px);}
.card.glow{box-shadow:0 0 24px rgba(0,229,255,.08);border-color:rgba(0,229,255,.2);}

.row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.btn{background:linear-gradient(135deg,var(--neon),#0096b3);color:#001016;border:none;
  padding:12px 16px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;
  transition:transform .1s,filter .15s;width:100%;}
.btn:active{transform:scale(.96);}
.btn.alt{background:linear-gradient(135deg,var(--neon2),#a01545);color:#fff;}
.btn.gold{background:linear-gradient(135deg,var(--gold),#c79215);color:#1a1500;}
.btn.dark{background:#1c1f2b;color:var(--txt);border:1px solid var(--line);}
.btn.sm{padding:8px 12px;font-size:12px;width:auto;}
.btn:disabled{opacity:.4;filter:grayscale(1);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;
  background:rgba(255,255,255,.08);margin-right:4px;}
.tag.r{color:var(--neon2);} .tag.g{color:var(--green);} .tag.b{color:var(--neon);}
.tag.y{color:var(--gold);}

.bar{height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:5px;}
.bar i{display:block;height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.bar.hp i{background:linear-gradient(90deg,#ff3b3b,#ff7a3b);}
.bar.xp i{background:linear-gradient(90deg,var(--neon),var(--gold));}

/* NAV */
#nav{display:flex;background:linear-gradient(0deg,#0d0e14,#15171f);
  border-top:1px solid var(--line);z-index:5;}
.nav-btn{flex:1;padding:9px 2px;text-align:center;color:var(--dim);font-size:9px;
  cursor:pointer;transition:color .15s;border:none;background:none;}
.nav-btn .ic{font-size:19px;display:block;margin-bottom:1px;}
.nav-btn.active{color:var(--neon);}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;z-index:50;
  align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px);}
#modal.show{display:flex;}
.mbox{background:var(--bg2);border:1px solid var(--line);border-radius:18px;
  padding:20px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;}
.mbox h3{margin-bottom:8px;font-size:18px;}
.mbox p{color:var(--dim);font-size:13px;margin-bottom:14px;line-height:1.5;}

/* COMBAT */
#combat{position:fixed;inset:0;display:none;z-index:40;background:#000;}
#combat.show{display:block;}
#cbCanvas{position:absolute;inset:0;}
#cbHud{position:absolute;inset:0;pointer-events:none;}
#cbTop{position:absolute;top:0;left:0;right:0;padding:12px;display:flex;
  justify-content:space-between;pointer-events:none;}
.cbside{background:rgba(0,0,0,.5);padding:6px 12px;border-radius:10px;font-size:13px;font-weight:700;}
#joyL{position:absolute;bottom:30px;left:24px;width:110px;height:110px;
  border-radius:50%;background:rgba(255,255,255,.06);border:2px solid var(--line);
  pointer-events:auto;touch-action:none;}
#joyLknob{position:absolute;width:50px;height:50px;border-radius:50%;
  background:rgba(0,229,255,.35);border:2px solid var(--neon);top:30px;left:30px;}
#fireBtn{position:absolute;bottom:40px;right:30px;width:90px;height:90px;border-radius:50%;
  background:radial-gradient(var(--neon2),#80142f);border:3px solid #fff3;color:#fff;
  font-weight:800;font-size:13px;pointer-events:auto;touch-action:none;}
#reloadBtn{position:absolute;bottom:140px;right:48px;width:54px;height:54px;border-radius:50%;
  background:rgba(0,0,0,.5);border:2px solid var(--gold);color:var(--gold);
  font-size:11px;font-weight:700;pointer-events:auto;}
#cbResult{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;
  flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;gap:14px;}
#cbResult.show{display:flex;}

#charCanvas{width:100%;height:230px;border-radius:14px;background:#070810;margin-bottom:12px;}
.opt{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.opt button{flex:1;min-width:70px;padding:9px;border-radius:10px;background:#1c1f2b;
  border:1px solid var(--line);color:var(--txt);font-size:12px;font-weight:600;cursor:pointer;}
.opt button.sel{background:var(--neon);color:#001016;border-color:var(--neon);}
input[type=text]{width:100%;padding:11px;border-radius:10px;background:#1c1f2b;
  border:1px solid var(--line);color:var(--txt);font-size:14px;margin-bottom:12px;}

#log{position:fixed;bottom:60px;left:10px;right:10px;z-index:6;pointer-events:none;}
.logmsg{background:rgba(0,0,0,.7);border-left:3px solid var(--neon);padding:7px 10px;
  border-radius:8px;font-size:12px;margin-top:6px;animation:slideIn .3s;}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}

::-webkit-scrollbar{width:0;}
</style>
</head>

function initEnemyGangs(){
  S.enemyGangs=[];
  const n=Math.min(GANG_NAMES.length,BOSS_NAMES.length);
  for(let i=0;i<n;i++){
    const terr=[ZONES[Math.floor(Math.random()*ZONES.length)].id];

      id:i, name:GANG_NAMES[i], boss:BOSS_NAMES[i],

      territories:terr, money:1000+Math.floor(Math.random()*20000),
      rep: -20+Math.floor(Math.random()*40),
    });

}

function saveGame(){
  try{ localStorage.setItem(SAVE_KEY,JSON.stringify(S)); }catch(e){}
}

    if(d){ S=JSON.parse(d); return true; }

/* ============================================================
   HELPERS
============================================================ */
const $=id=>document.getElementById(id);
const fmt=n=>{ n=Math.floor(n);
  if(n>=1e9)return (n/1e9).toFixed(1)+'B';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return (n/1e3).toFixed(1)+'K';
  return ''+n; };
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function xpForLevel(lvl){ return Math.floor(50*lvl*Math.pow(1.12,lvl-1)); }

function addXP(amt){
  S.xp+=amt;
  while(S.level<CFG.maxLevel && S.xp>=xpForLevel(S.level)){
    S.xp-=xpForLevel(S.level); S.level++; S.sp+=3;
    pushLog('📈 Уровень '+S.level+'! +3 очка развития');
  }
  refreshTop();
}

function pushLog(msg){
  S.log.unshift({t:Date.now(),m:msg}); if(S.log.length>40)S.log.pop();
  const box=$('log');
  const el=document.createElement('div'); el.className='logmsg'; el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .4s'; el.style.opacity='0';
    setTimeout(()=>el.remove(),400); },3200);
  while(box.children.length>4) box.removeChild(box.firstChild);
}

function money(n){ S.cash=Math.max(0,S.cash+n); refreshTop(); saveGame(); }
function canPay(n){ return S.cash>=n; }

function addHeat(n){ S.heat=clamp(S.heat+n,0,5); refreshTop(); }

/* ============================================================
   AUDIO (Web Audio synth)
============================================================ */
const Audio0={
  ctx:null, on:true,
  init(){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} },
  tone(freq,dur,type='square',vol=.12){
    if(!this.ctx||!this.on)return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.value=vol; o.connect(g); g.connect(this.ctx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+dur);
    o.stop(this.ctx.currentTime+dur);
  },
  shot(){ this.tone(120+Math.random()*60,.08,'sawtooth',.18);
          this.tone(60,.12,'square',.1); },
  hit(){ this.tone(200,.05,'square',.15); },
  click(){ this.tone(440,.04,'sine',.1); },
  cash(){ this.tone(660,.06,'sine',.12); this.tone(880,.08,'sine',.1); },
  win(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.tone(f,.18,'triangle',.14),i*120)); },
  lose(){ [440,349,262].forEach((f,i)=>setTimeout(()=>this.tone(f,.25,'sawtooth',.13),i*180)); },
  reload(){ this.tone(300,.05,'square',.1); setTimeout(()=>this.tone(450,.05,'square',.1),120); },
};

function makeRenderer(canvas){
  const r=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
  r.setPixelRatio(Math.min(devicePixelRatio,2));
  r.shadowMap.enabled=true; r.shadowMap.type=THREE.PCFSoftShadowMap;
  return r;
}

// материал «неон-нуар»
function mat(col,opt={}){ return new THREE.MeshStandardMaterial({color:col,
  roughness:opt.r??.7,metalness:opt.m??.1,emissive:opt.e??0x000000,emissiveIntensity:opt.ei??1}); }

// ---- ГЕНЕРАЦИЯ ЧЕЛОВЕКА (humanoid) ----
function buildHuman(opt={}){
  const g=new THREE.Group();
  const skinCols=[0xe8b890,0xd2986a,0xa9744e,0x7a5230,0xf0c8a0];
  const skin=skinCols[opt.skin??0]||skinCols[0];
  const cloth=opt.cloth??0x2a3a5a;
  const M=(c,o)=>mat(c,o);
  // тело
  const torso=new THREE.Mesh(new THREE.CapsuleGeometry(.26,.55,4,8),M(cloth,{r:.8}));
  torso.position.y=1.05; torso.castShadow=true; g.add(torso);
  // голова
  const head=new THREE.Mesh(new THREE.SphereGeometry(.21,16,16),M(skin,{r:.6}));
  head.position.y=1.62; head.castShadow=true; g.add(head);
  // волосы
  const hairCols=[0x1a1209,0x3a2a15,0x5a3a1a,0x101010,0x888888,0x8a2a2a];
  const hair=new THREE.Mesh(new THREE.SphereGeometry(.225,16,12,0,Math.PI*2,0,Math.PI*0.6),
    M(hairCols[opt.hair??0]||hairCols[0],{r:.9}));
  hair.position.y=1.66; g.add(hair);
  // руки
  const armGeo=new THREE.CapsuleGeometry(.085,.42,4,6);
  const armL=new THREE.Mesh(armGeo,M(cloth,{r:.8})); armL.position.set(-.34,1.05,0); armL.castShadow=true; g.add(armL);
  const armR=new THREE.Mesh(armGeo,M(cloth,{r:.8})); armR.position.set(.34,1.05,0); armR.castShadow=true; g.add(armR);
  // кисти
  const handGeo=new THREE.SphereGeometry(.09,8,8);
  const hL=new THREE.Mesh(handGeo,M(skin)); hL.position.set(-.34,.78,0); g.add(hL);
  const hR=new THREE.Mesh(handGeo,M(skin)); hR.position.set(.34,.78,0); g.add(hR);
  // ноги
  const legGeo=new THREE.CapsuleGeometry(.11,.5,4,6);
  const legL=new THREE.Mesh(legGeo,M(0x1a1a22,{r:.9})); legL.position.set(-.14,.42,0); legL.castShadow=true; g.add(legL);
  const legR=new THREE.Mesh(legGeo,M(0x1a1a22,{r:.9})); legR.position.set(.14,.42,0); legR.castShadow=true; g.add(legR);

  g.userData={head,torso,armL,armR,legL,legR,hR};
  return g;
}

// ---- ОРУЖИЕ модель (простое) ----
function buildWeaponMesh(wid){
  const w=W(wid); const grp=new THREE.Group();
  if(!w||w.cat==='Холодное'){
    const b=new THREE.Mesh(new THREE.BoxGeometry(.05,.05,.4),mat(w?w.col:0xcccccc,{m:.6,r:.4}));
    b.position.z=.2; grp.add(b); return grp;
  }
  const body=new THREE.Mesh(new THREE.BoxGeometry(.08,.14,.55),mat(w.col,{m:.7,r:.4}));
  body.position.z=.25; grp.add(body);
  const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.4,8),mat(0x111111,{m:.8,r:.3}));
  barrel.rotation.x=Math.PI/2; barrel.position.set(0,.03,.5); grp.add(barrel);
  const mg=new THREE.Mesh(new THREE.BoxGeometry(.06,.18,.08),mat(0x222222,{m:.5}));
  mg.position.set(0,-.12,.15); grp.add(mg);
  return grp;
}

let charScene,charRen,charCam,charMesh,charRAF;
function startCharPreview(){
  const cv=$('charCanvas'); if(!cv)return;
  charRen=makeRenderer(cv);
  charScene=new THREE.Scene();
  charScene.background=new THREE.Color(0x070810);
  charScene.fog=new THREE.Fog(0x070810,4,9);
  charCam=new THREE.PerspectiveCamera(45,cv.clientWidth/cv.clientHeight,.1,50);
  charCam.position.set(0,1.2,3.2);
  const amb=new THREE.AmbientLight(0x3344aa,.6); charScene.add(amb);
  const key=new THREE.DirectionalLight(0x00e5ff,1.4); key.position.set(2,4,3); key.castShadow=true; charScene.add(key);
  const rim=new THREE.DirectionalLight(0xff2d6e,.9); rim.position.set(-3,2,-2); charScene.add(rim);
  const floor=new THREE.Mesh(new THREE.CircleGeometry(1.6,32),mat(0x12141d,{r:.4,m:.3}));
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; charScene.add(floor);
  rebuildCharMesh();
  function resize(){ charRen.setSize(cv.clientWidth,cv.clientHeight,false);
    charCam.aspect=cv.clientWidth/cv.clientHeight; charCam.updateProjectionMatrix(); }
  resize(); window.addEventListener('resize',resize);
  let t=0;
  (function loop(){ charRAF=requestAnimationFrame(loop); t+=.012;
    if(charMesh)charMesh.rotation.y=t;
    charRen.render(charScene,charCam); })();
}
function rebuildCharMesh(){
  if(charMesh)charScene.remove(charMesh);
  charMesh=buildHuman({skin:tmpChar.skin,hair:tmpChar.hair,cloth:tmpChar.sex==='m'?0x2a3a5a:0x5a2a4a});
  charScene.add(charMesh);
}
function stopCharPreview(){ if(charRAF)cancelAnimationFrame(charRAF);
  if(charRen)charRen.dispose(); charScene=null; }

function totalIncome(){
  let inc=0;
  S.bizOwned.forEach(id=>inc+=BIZ[id].income);
  S.bizExtorted.forEach(e=>inc+=Math.floor(BIZ[e.bizId].income*e.pct));
  inc+=S.territories.length*60;
  return inc;
}
function playerPower(){
  let p=S.level*8+(S.stats.str+S.stats.acc+S.stats.def)*3;
  S.gang.forEach(u=>{ const t=UNIT_TYPES[u.typeId]; p+=t.tier*15+u.lvl*5+(W(u.wpn)?.dmg||5); });
  return Math.floor(p);
}

function runJob(j){
  const luck=S.stats.luck+S.stats.int*.5;
  const success=Math.random() < clamp(.45+luck*.03+playerPower()*.0008-j[3]*.08,.1,.92);
  if(success){
    const reward=ri(j[1],j[2])*(1+S.gang.length*.05);
    money(reward); addXP(j[3]*20); S.resp+=j[3]*2; addHeat(j[4]);
    Audio0.cash(); pushLog(`✅ ${j[0]}: +${fmt(reward)}$`);
  }else{
    addHeat(j[4]+1);
    const wounded=S.gang.length&&Math.random()<.4;
    if(wounded){ const u=pick(S.gang); u.hp=Math.max(1,Math.floor(u.maxHp*.4)); pushLog(`❌ ${j[0]} провал! ${u.name} ранен`); }
    else pushLog(`❌ ${j[0]} провал! Розыск повышен`);
    Audio0.lose();
  }
  refreshTop(); saveGame(); go('home');
}

  const cost=200+S.level*40;

  if(S.gang.length){ const u=pick(S.gang); u.xp+=20; checkUnitLevel(u); }

  go('home');
}

/* ============================================================
   БОЕВАЯ СИСТЕМА 3D (top-down arena shooter)
============================================================ */
let CB=null;
function startCombat(enemyGang,zoneId){
  Audio0.init();
  $('combat').classList.add('show');
  $('cbResult').classList.remove('show');
  const cv=$('cbCanvas');
  const ren=makeRenderer(cv);
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a0b14); scene.fog=new THREE.Fog(0x0a0b14,20,55);
  const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);
  scene.add(new THREE.AmbientLight(0x445566,.6));
  const sun=new THREE.DirectionalLight(0xffeecc,1.1); sun.position.set(10,20,8); sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.far=60; scene.add(sun);
  // неон-подсветка
  scene.add(Object.assign(new THREE.PointLight(0x00e5ff,1.2,40),{position:new THREE.Vector3(-15,8,0)}));
  scene.add(Object.assign(new THREE.PointLight(0xff2d6e,1.2,40),{position:new THREE.Vector3(15,8,0)}));
  // арена
  const zone=ZONES[zoneId]||ZONES[0];
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(60,60),mat(zone.col,{r:.9,m:.1}));
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
  for(let i=0;i<10;i++){ const w=new THREE.Mesh(new THREE.BoxGeometry(rnd(2,5),rnd(2,4),rnd(2,5)),mat(0x1a1d28,{r:.8}));
    w.position.set(rnd(-22,22),1.5,rnd(-22,22)); w.castShadow=true; w.receiveShadow=true; scene.add(w); }

  // игрок (босс)
  const player={mesh:buildHuman({skin:S.skin,hair:S.hair,cloth:0x224488}),hp:100+S.stats.def*8,maxHp:100+S.stats.def*8,
    wpn:'ak47',ammo:30,mag:30,reloading:0,cd:0,isPlayer:true,team:0,alive:true,x:0,z:18,ang:Math.PI};
  player.mesh.position.set(0,0,18); scene.add(player.mesh);
  const pw=buildWeaponMesh(player.wpn); pw.position.set(.34,.85,.2); player.mesh.add(pw); player.weaponMesh=pw;

  const allies=[player];
  S.gang.filter(u=>u.hp>0).slice(0,8).forEach((u,i)=>{
    const t=UNIT_TYPES[u.typeId];
    const m=buildHuman({skin:i%5,hair:i%6,cloth:0x335577});
    const a={mesh:m,hp:u.hp,maxHp:u.maxHp,wpn:u.wpn,ammo:W(u.wpn)?.mag||0,mag:W(u.wpn)?.mag||0,reloading:0,cd:0,
      team:0,alive:true,x:rnd(-6,6),z:18-rnd(1,4),ang:Math.PI,unitRef:u};
    m.position.set(a.x,0,a.z); scene.add(m);
    const wm=buildWeaponMesh(u.wpn); wm.position.set(.34,.85,.2); m.add(wm); a.weaponMesh=wm;
    allies.push(a);
  });

  // враги
  const enemies=[];
  const enemyCount=clamp(3+Math.floor(enemyGang.power/25),3,12);
  for(let i=0;i<enemyCount;i++){
    const tier=clamp(1+Math.floor(enemyGang.power/40),1,9);
    const types=UNIT_TYPES.filter(t=>t.tier<=tier);
    const t=pick(types);
    const hp=80+t.tier*40;
    const m=buildHuman({skin:(i+2)%5,hair:i%6,cloth:0x882233});
    const e={mesh:m,hp,maxHp:hp,wpn:t.defW,ammo:W(t.defW)?.mag||0,mag:W(t.defW)?.mag||0,reloading:0,cd:0,
      team:1,alive:true,x:rnd(-18,18),z:rnd(-20,-8),ang:0,boss:i===0};
    m.position.set(e.x,0,e.z); scene.add(m);
    const wm=buildWeaponMesh(t.defW); wm.position.set(.34,.85,.2); m.add(wm); e.weaponMesh=wm;
    enemies.push(e);
  }

  const bullets=[]; const fx=[];
  const all=[...allies,...enemies];
  CB={ren,scene,cam,player,allies,enemies,all,bullets,fx,enemyGang,zoneId,
    move:{x:0,z:0},firing:false,raf:0,over:false};

  setupCombatControls();
  updateCBHud();
  let last=performance.now();
  function loop(now){
    if(!CB||CB.over){ return; }
    CB.raf=requestAnimationFrame(loop);
    const dt=Math.min(.05,(now-last)/1000); last=now;
    stepCombat(dt);
    // камера за игроком
    cam.position.set(player.mesh.position.x,16,player.mesh.position.z+14);
    cam.lookAt(player.mesh.position.x,0,player.mesh.position.z-2);
    ren.setSize(innerWidth,innerHeight,false); cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
    ren.render(scene,cam);
  }
  CB.raf=requestAnimationFrame(loop);
}

function stepCombat(dt){
  const {player,allies,enemies,bullets,fx}=CB;
  // игрок движение
  const sp=6+S.stats.spd*.3;
  if(CB.move.x||CB.move.z){
    player.mesh.position.x=clamp(player.mesh.position.x+CB.move.x*sp*dt,-26,26);
    player.mesh.position.z=clamp(player.mesh.position.z+CB.move.z*sp*dt,-26,26);
    player.mesh.rotation.y=Math.atan2(CB.move.x,CB.move.z);
    // анимация ног
    const t=performance.now()*.012;
    player.mesh.userData.legL.rotation.x=Math.sin(t)*.5;
    player.mesh.userData.legR.rotation.x=-Math.sin(t)*.5;
  }
  // игрок стрельба
  player.cd-=dt; if(player.reloading>0){player.reloading-=dt; if(player.reloading<=0){player.ammo=player.mag;}}
  if(CB.firing&&player.cd<=0&&player.reloading<=0&&player.ammo>0){
    fireWeapon(player,nearestTarget(player,enemies)); 
  }
  // AI союзники
  allies.forEach(a=>{ if(a===player||!a.alive)return; aiUnit(a,enemies,dt); });
  // AI враги
  enemies.forEach(e=>{ if(!e.alive)return; aiUnit(e,allies,dt); });
  // пули
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i];
    b.mesh.position.addScaledVector(b.dir,b.spd*dt); b.life-=dt;
    let hit=false;
    const targets=b.team===0?enemies:allies;
    for(const tg of targets){ if(!tg.alive)continue;
      const dx=tg.mesh.position.x-b.mesh.position.x, dz=tg.mesh.position.z-b.mesh.position.z;
      if(dx*dx+dz*dz<1.1){ damageUnit(tg,b.dmg); spawnFx(b.mesh.position.clone(),0xff5533); Audio0.hit(); hit=true; break; }
    }
    if(hit||b.life<=0){ CB.scene.remove(b.mesh); bullets.splice(i,1); }
  }
  // fx
  for(let i=fx.length-1;i>=0;i--){ const f=fx[i]; f.life-=dt; f.mesh.scale.multiplyScalar(1.08);
    f.mesh.material.opacity=f.life*4; if(f.life<=0){ CB.scene.remove(f.mesh); fx.splice(i,1); } }
  // проверка конца
  const allyAlive=allies.some(a=>a.alive), enemyAlive=enemies.some(e=>e.alive);
  if(!enemyAlive){ endCombat(true); }
  else if(!allyAlive){ endCombat(false); }
}

function aiUnit(u,targets,dt){
  const tg=nearestTarget(u,targets); if(!tg){return;}
  const dx=tg.mesh.position.x-u.mesh.position.x, dz=tg.mesh.position.z-u.mesh.position.z;
  const dist=Math.hypot(dx,dz); const w=W(u.wpn);
  u.mesh.rotation.y=Math.atan2(dx,dz);
  const optimal=Math.min((w?.rng||10)*.7,20);
  if(dist>optimal){ const s=4*dt; u.mesh.position.x+=dx/dist*s; u.mesh.position.z+=dz/dist*s;
    const t=performance.now()*.012; u.mesh.userData.legL.rotation.x=Math.sin(t)*.5; u.mesh.userData.legR.rotation.x=-Math.sin(t)*.5; }
  u.cd-=dt; if(u.reloading>0){u.reloading-=dt; if(u.reloading<=0)u.ammo=u.mag;}
  if(dist<(w?.rng||10)*1.1&&u.cd<=0&&u.reloading<=0){
    if(u.ammo>0||u.mag===0)fireWeapon(u,tg);
  }
}
function nearestTarget(u,arr){ let best=null,bd=1e9;
  arr.forEach(t=>{ if(!t.alive)return; const d=(t.mesh.position.x-u.mesh.position.x)**2+(t.mesh.position.z-u.mesh.position.z)**2;
    if(d<bd){bd=d;best=t;} }); return best; }

function fireWeapon(u,tg){
  if(!tg)return; const w=W(u.wpn)||W('fists');
  u.cd=1/(w.rof||1);
  if(w.mag>0){ u.ammo--; if(u.ammo<=0){ u.reloading=w.rel; if(u.isPlayer)Audio0.reload(); } }
  const dmg=w.dmg*(u.isPlayer?(1+S.stats.acc*.04):(1+(u.unitRef?.lvl||1)*.03))*rnd(.85,1.15);
  Audio0.shot();
  // muzzle flash
  spawnFx(u.mesh.position.clone().add(new THREE.Vector3(0,1,0)),0xffaa33,.6);
  if(w.cat==='Холодное'){ // мгновенный урон если близко
    const d=Math.hypot(tg.mesh.position.x-u.mesh.position.x,tg.mesh.position.z-u.mesh.position.z);
    if(d<w.rng*1.3){ damageUnit(tg,dmg); Audio0.hit(); } return;
  }
  // снаряд
  const dir=new THREE.Vector3(tg.mesh.position.x-u.mesh.position.x,0,tg.mesh.position.z-u.mesh.position.z).normalize();
  const spread=(1-w.acc)*.4; dir.x+=rnd(-spread,spread); dir.z+=rnd(-spread,spread); dir.normalize();
  const pellets=w.cat==='Дробовик'?5:1;
  for(let p=0;p<pellets;p++){
    const d2=dir.clone(); if(pellets>1){d2.x+=rnd(-.15,.15);d2.z+=rnd(-.15,.15);d2.normalize();}
    const bm=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6),
      new THREE.MeshBasicMaterial({color:u.team===0?0x00e5ff:0xff2d6e}));
    bm.position.copy(u.mesh.position).add(new THREE.Vector3(0,1,0));
    CB.scene.add(bm);
    CB.bullets.push({mesh:bm,dir:d2,spd:45,dmg:dmg/pellets*(pellets>1?1.4:1),team:u.team,life:w.rng/45+.3});
  }
}
function damageUnit(u,dmg){
  if(!u.alive)return; u.hp-=dmg;
  // вспышка попадания
  u.mesh.userData.torso.material.emissive.setHex(0xff0000);
  setTimeout(()=>{ if(u.mesh)u.mesh.userData.torso.material.emissive.setHex(0x000000); },100);
  if(u.hp<=0){ u.alive=false; u.mesh.rotation.z=Math.PI/2; u.mesh.position.y=.3;
    if(u.unitRef)u.unitRef.hp=0;
    updateCBHud(); }
}
function spawnFx(pos,col,scale=.3){
  const m=new THREE.Mesh(new THREE.SphereGeometry(scale,6,6),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:1}));
  m.position.copy(pos); CB.scene.add(m); CB.fx.push({mesh:m,life:.25});
}
function updateCBHud(){
  $('cbAlly').textContent='СВОИ: '+CB.allies.filter(a=>a.alive).length;
  $('cbEnemy').textContent='ВРАГИ: '+CB.enemies.filter(e=>e.alive).length;
}

function endCombat(win){
  if(CB.over)return; CB.over=true; cancelAnimationFrame(CB.raf);
  // обновляем hp бойцов
  CB.allies.forEach(a=>{ if(a.unitRef){ a.unitRef.hp=a.alive?Math.max(1,Math.floor(a.hp)):0;
    if(!a.alive){} else a.unitRef.xp+=win?40:15; if(a.unitRef)checkUnitLevel(a.unitRef); } });
  // удаляем убитых из банды
  S.gang=S.gang.filter(u=>u.hp>0);
  const g=CB.enemyGang;
  let html='';
  if(win){
    const loot=Math.floor(g.money*rnd(.6,1));
    money(loot); addXP(g.power*2); S.resp+=g.territories.length*5+5; Audio0.win();
    // захват территории
    if(CB.zoneId!=null&&!S.territories.includes(CB.zoneId)){ S.territories.push(CB.zoneId); }
    // ослабляем/уничтожаем банду
    g.territories=g.territories.filter(t=>t!==CB.zoneId);
    g.power=Math.floor(g.power*.6); g.money=Math.floor(g.money*.3);
    if(g.power<10&&!g.territories.length){ pushLog('💀 '+g.name+' уничтожена!'); }
    html=`<h3 style="color:var(--green)">🏆 ПОБЕДА!</h3>
      <p style="text-align:center">+${fmt(loot)}$ · +${fmt(g.power*2)} опыта · +репутация${CB.zoneId!=null?'<br>🗺️ Район захвачен!':''}</p>`;
  }else{
    addHeat(2); Audio0.lose();
    const loss=Math.floor(S.cash*.15); money(-loss);
    html=`<h3 style="color:var(--neon2)">💀 ПОРАЖЕНИЕ</h3>
      <p style="text-align:center">Потеряно ${fmt(loss)}$ · розыск повышен<br>Некоторые бойцы погибли</p>`;
  }
  html+='<button class="btn" id="cbExit">Вернуться</button>';
  $('cbResult').innerHTML=html; $('cbResult').classList.add('show');
  $('cbExit').onclick=()=>{
    $('combat').classList.remove('show');
    CB.ren.dispose(); CB=null;
    refreshTop(); saveGame(); go('home');
  };
}

/* ---- УПРАВЛЕНИЕ БОЕМ ---- */
let joyActive=false,joyCx=0,joyCy=0;
function setupCombatControls(){
  const joy=$('joyL'),knob=$('joyLknob'),fire=$('fireBtn'),reload=$('reloadBtn');
  const setKnob=(dx,dy)=>{ knob.style.left=(30+dx)+'px'; knob.style.top=(30+dy)+'px'; };
  const start=e=>{ joyActive=true; const r=joy.getBoundingClientRect(); joyCx=r.left+r.width/2; joyCy=r.top+r.height/2; move(e); };
  const move=e=>{ if(!joyActive||!CB)return; const t=e.touches?e.touches[0]:e;
    let dx=t.clientX-joyCx, dy=t.clientY-joyCy; const d=Math.hypot(dx,dy),max=40;
    if(d>max){dx=dx/d*max;dy=dy/d*max;}     setKnob(dx,dy); CB.move.x=dx/max; CB.move.z=dy/max; };
  const end=()=>{ joyActive=false; setKnob(0,0); if(CB){CB.move.x=0;CB.move.z=0;} };
  joy.ontouchstart=start; joy.ontouchmove=move; joy.ontouchend=end;
  joy.onmousedown=start; window.onmousemove=move; window.onmouseup=end;
  const fireDown=()=>{ if(CB)CB.firing=true; };
  const fireUp=()=>{ if(CB)CB.firing=false; };
  fire.ontouchstart=e=>{e.preventDefault();fireDown();}; fire.ontouchend=fireUp;
  fire.onmousedown=fireDown; fire.onmouseup=fireUp;
  reload.onclick=()=>{ if(CB&&CB.player){ const w=W(CB.player.wpn); if(w.mag>0&&CB.player.ammo<w.mag){CB.player.reloading=w.rel;Audio0.reload();} } };
}

/* ============================================================
   ЭКОНОМИКА / СИМУЛЯЦИЯ (тики)
============================================================ */
function gameTick(){
  if(!S||!S.created)return;
  const now=Date.now();
  // доход бизнесов
  if(now-S.lastEco>=CFG.tickEco){
    const inc=totalIncome(); if(inc>0){ S.cash+=inc; }
    // зарплаты
    const sal=totalSalary(); S.cash=Math.max(0,S.cash-sal);
    if(sal>S.cash+inc&&S.gang.length){ // не платим → падает лояльность
      const u=pick(S.gang); u.loyal=clamp(u.loyal-.1,0,1);
      if(u.loyal<=0){ S.gang=S.gang.filter(x=>x.uid!==u.uid); pushLog('🚪 '+u.name+' ушёл — нет денег'); }
    }
    // регенерация бойцов
    S.gang.forEach(u=>{ if(u.hp<u.maxHp)u.hp=Math.min(u.maxHp,u.hp+Math.ceil(u.maxHp*.05)); });
    S.lastEco=now; refreshTop(); if(curScreen==='home')go('home');
    saveGame();
  }
  // снижение розыска
  if(S.heat>0&&now-(S.lastHeat||0)>60000){ S.lastHeat=now; }
  // симуляция войн банд
  if(now-S.lastSim>=CFG.tickSim){ simEnemyGangs(); S.lastSim=now; }
  // случайные события
  if(now-S.lastEvent>=CFG.tickEvent){ randomEvent(); S.lastEvent=now; }
}
function simEnemyGangs(){
  // банды растут, воюют между собой, захватывают районы
  S.enemyGangs.forEach(g=>{
    if(g.power<5)return;
    g.power+=ri(0,4); g.money+=ri(0,800);
    if(Math.random()<.1){ // экспансия
      const free=ZONES.find(z=>!S.territories.includes(z.id)&&!g.territories.includes(z.id));
      if(free&&Math.random()<.3)g.territories.push(free.id);
    }
    // атака на игрока
    if(Math.random()<.04&&g.power>playerPower()*1.2&&S.territories.length>1){
      const lost=pick(S.territories.filter(t=>t!==0));
      if(lost!=null){ S.territories=S.territories.filter(t=>t!==lost); g.territories.push(lost);
        pushLog('⚠️ '+g.name+' захватила '+ZONES[lost].n+'!'); }
    }
  });
  // войны между бандами
  if(S.enemyGangs.length>1&&Math.random()<.3){
    const a=pick(S.enemyGangs),b=pick(S.enemyGangs);
    if(a!==b&&a.power>0&&b.power>0){
      const loser=a.power<b.power?a:b;
      loser.power=Math.floor(loser.power*.85);
    }
  }
  saveGame();
}
function randomEvent(){
  const ev=[
    ()=>{ const m=ri(200,1500); money(m); pushLog('💰 Удачная сделка: +'+fmt(m)+'$'); },
    ()=>{ if(S.gang.length){ const u=pick(S.gang); u.xp+=30; checkUnitLevel(u); pushLog('💪 '+u.name+' стал сильнее'); } },
    ()=>{ const c=ri(100,800); if(S.cash>c){money(-c); pushLog('🚓 Взятка копам: -'+fmt(c)+'$'); } },
    ()=>{ S.resp+=ri(3,15); pushLog('📰 Слухи о тебе по городу: +репутация'); refreshTop(); },
    ()=>{ if(S.heat>0){S.heat=clamp(S.heat-1,0,5); pushLog('😌 Розыск немного спал'); refreshTop();} },
    ()=>{ if(S.gang.length>2&&Math.random()<.5){ const u=pick(S.gang); u.hp=Math.max(1,Math.floor(u.hp*.6)); pushLog('🔪 На '+u.name+' напали!'); } },
  ];
  pick(ev)(); saveGame();
}

/* ============================================================
   BOOT
============================================================ */
function boot(){
  buildNav();
  if(loadGame()&&S.created){
    Audio0.init(); refreshTop(); go('home'); pushLog('▶️ С возвращением, '+S.name);
  }else{
    showCreator();
  }
  setInterval(gameTick,1000);
  // разблокировка аудио по первому тапу
  document.body.addEventListener('pointerdown',()=>{ if(Audio0.ctx&&Audio0.ctx.state==='suspended')Audio0.ctx.resume(); },{once:false});
}
boot();
</script>
